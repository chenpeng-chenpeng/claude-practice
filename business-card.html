<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人名片</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #fff;
      font-weight: bold;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .title {
      font-size: 14px;
      color: #667eea;
      font-weight: 500;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      margin: 0 auto 20px;
      border-radius: 2px;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #f8f9fc;
      border-radius: 10px;
      font-size: 14px;
      color: #333;
    }

    .contact-item .icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👤</div>
    <div class="name">张三</div>
    <div class="title">高级软件工程师</div>
    <div class="divider"></div>
    <div class="contact">
      <div class="contact-item">
        <span class="icon">📧</span>
        <span>zhangsan@example.com</span>
      </div>
      <div class="contact-item">
        <span class="icon">📱</span>
        <span>+86 138-0000-0000</span>
      </div>
      <div class="contact-item">
        <span class="icon">📍</span>
        <span>中国 · 北京</span>
      </div>
      <div class="contact-item">
        <span class="icon">🌐</span>
        <span>github.com/zhangsan</span>
      </div>
    </div>
  </div>
</body>
</html>
